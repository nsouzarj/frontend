<div class="container mx-auto p-6">
  <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
    <h1 class="text-3xl font-bold text-gray-800 flex items-center">
        <mat-icon class="mr-2 text-primary-600 scale-125">pets</mat-icon>
        Gerenciamento de Raças
    </h1>
    <div class="flex gap-2">
        <button mat-raised-button color="primary" (click)="openBreedDialog()">
            <mat-icon>add</mat-icon>
            Nova Raça
        </button>
        <a mat-button routerLink="/dashboard">
            <mat-icon>arrow_back</mat-icon>
            Voltar
        </a>
    </div>
  </div>

  <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 relative flex items-center" role="alert">
    <mat-icon class="mr-2">error</mat-icon>
    <span class="block sm:inline"> {{ errorMessage }}</span>
  </div>

  <!-- Listing Section in a Card-like Elevated Div -->
  <div class="mat-elevation-z8 rounded-lg overflow-hidden bg-white">
    <!-- Filter -->
    <div class="px-6 pt-4">
        <mat-form-field appearance="outline" class="w-full">
            <mat-label>Filtrar</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Busque por nome..." #input>
            <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
        <table mat-table [dataSource]="dataSource" class="w-full">
        
        <!-- Name Column -->
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef class="bg-gray-50 font-bold text-gray-700 px-6 py-4"> Nome </th>
            <td mat-cell *matCellDef="let breed" class="px-6 py-4"> {{breed.name}} </td>
        </ng-container>

        <!-- Species Column -->
        <ng-container matColumnDef="species">
            <th mat-header-cell *matHeaderCellDef class="bg-gray-50 font-bold text-gray-700 px-6 py-4"> Espécie </th>
            <td mat-cell *matCellDef="let breed" class="px-6 py-4"> 
                <span [style.color]="breed.species === 'dog' ? 'brown' : 'orange'" class="font-medium">
                    {{breed.species | speciesTranslate}}
                </span>
            </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="bg-gray-50 font-bold text-gray-700 text-right pr-6"> Ações </th>
            <td mat-cell *matCellDef="let breed" class="text-right pr-6">
                <button mat-icon-button (click)="openBreedDialog(breed)" matTooltip="Editar">
                    <mat-icon class="text-blue-600">edit</mat-icon>
                </button>
                <button mat-icon-button (click)="deleteBreed(breed)" matTooltip="Excluir">
                    <mat-icon class="text-rose-600">delete</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-gray-50 transition-colors"></tr>

        <!-- Row shown when there is no matching data. -->
        <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell text-center py-6 text-gray-500" colspan="3">
                <div class="flex flex-col items-center justify-center">
                    <mat-icon class="text-gray-300 text-4xl mb-2 scale-150">search_off</mat-icon>
                    <span *ngIf="input.value">Nenhuma raça encontrada com o filtro "{{input.value}}"</span>
                    <span *ngIf="!input.value">Nenhuma raça cadastrada.</span>
                </div>
            </td>
        </tr>
        </table>
    </div>
    
    <mat-paginator [length]="totalBreeds"
                [pageSize]="pageSize"
                [pageSizeOptions]="[5, 10, 25, 100]"
                (page)="onPageChange($event)"
                aria-label="Selecionar página">
    </mat-paginator>
  </div>
</div>
